name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality (ubuntu, node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run release:check

  smoke:
    name: smoke (${{ matrix.os }}, node ${{ matrix.node-version }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: '22'
          - os: macos-latest
            node-version: '20'
          - os: windows-latest
            node-version: '20'
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:package
      - run: npm test -- src/commands/__tests__/firefox-workflows.integration.test.ts
