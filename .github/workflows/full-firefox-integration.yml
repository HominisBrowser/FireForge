name: Full Firefox Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  full-firefox:
    name: full-firefox (self-hosted)
    runs-on:
      - self-hosted
      - firefox-large
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:firefox-full
        env:
          FIREFORGE_FULL_PROJECT_ROOT: ${{ vars.FIREFORGE_FULL_PROJECT_ROOT }}
